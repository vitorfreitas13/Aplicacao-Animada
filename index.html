<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Aplicação Animada</title>
</head>
<body>
    <main>
        <div class="item active" style="--background: #ea3d41">
            <div class="title">Morango</div>
            <img src="imgs/Morango-refrigerante-foregroundBlur.png" alt="morango" class="fruit">
            <img src="imgs/Morango-refrigerante.png" alt="morango" class="refri">
        </div>

        <div class="item" style="--background: #2d5643">
            <div class="title">Abacate</div>
            <img src="imgs/Abacate-refrigerante-foregroundBlur.png" alt="abacate" class="fruit">
            <img src="imgs/Abacate-refrigerante.png" alt="abacate" class="refri">
        </div>

        <div class="item" style="--background: #e7a043">
            <div class="title">Laranja</div>
            <img src="imgs/Laranja-refrigerante-foregroundBlur.png" alt="laranja" class="fruit">
            <img src="imgs/Laranja-refrigerante.png" alt="laranja" class="refri">
        </div>

        <div class="arrow">
            <button id="prev"> < </button>
            <button id="next"> > </button>
        </div>
    </main>
</body>
<script src="./scripts.js"></script>
</html>
